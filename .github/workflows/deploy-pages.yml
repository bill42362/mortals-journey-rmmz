name: Deploy to GitHub Pages (per-branch)

# 每個 branch 部署到 gh-pages 分支的對應子資料夾，達成 per-branch 預覽路由：
#   main      → gh-pages 根目錄    → https://<user>.github.io/<repo>/
#   develop   → gh-pages/develop/  → https://<user>.github.io/<repo>/develop/
#   其他分支   → gh-pages/<branch>/ → https://<user>.github.io/<repo>/<branch>/
#
# RMMZ 用相對路徑載入素材，放在子資料夾天生可跑，無需設 base path。
# 防呆：game/index.html 不存在時（RMMZ 專案尚未建立）略過部署，不會失敗。
#
# ⚠️ 需於 repo Settings → Pages 將 Source 設為「Deploy from a branch」→ gh-pages /(root)。

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write # peaceiris 需推送至 gh-pages 分支

# 所有分支共用同一個 gh-pages 分支，序列化部署以避免 git push 競態
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（含 LFS 素材）
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 防呆 — 確認 RMMZ 專案已存在
        id: guard
        run: |
          if [ -f game/index.html ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::game/index.html 不存在，略過部署（RMMZ 專案尚未建立）。"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 檢查檔名大小寫衝突（Pages 為 Linux，區分大小寫）
        if: steps.guard.outputs.ready == 'true'
        run: |
          dupes=$(git -C game ls-files | tr '[:upper:]' '[:lower:]' | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::偵測到僅大小寫不同的檔名，於 GitHub Pages（Linux）會載入失敗："
            echo "$dupes"
            exit 1
          fi

      - name: 決定部署子路徑
        if: steps.guard.outputs.ready == 'true'
        id: route
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            echo "dir=" >> "$GITHUB_OUTPUT"   # main 部署到根目錄
          else
            safe=$(echo "$BRANCH" | tr '/' '-')
            echo "dir=$safe" >> "$GITHUB_OUTPUT"
          fi

      - name: 部署到 gh-pages 子資料夾
        if: steps.guard.outputs.ready == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./game
          destination_dir: ${{ steps.route.outputs.dir }}
          keep_files: true # 保留其他分支的子資料夾，不互相覆蓋
          commit_message: "deploy: ${{ github.ref_name }} @ ${{ github.sha }}"
